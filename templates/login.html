{% extends 'base.html' %}

{% block contenido %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">
    🛡️ IBFMS
</h3>

<form method="POST">

<div class="mb-3">
<label>Usuario</label>

<input
    type="text"
    name="usuario"

    required
>
</div>

<div class="mb-3">
<label>Contraseña</label>

<input
    type="password"

    required
>

<button
    class="btn btn-primary w-100"
>
Ingresar
</button>

</form>

</div>
</div>
</div>
</div>

{% endblock %}
