{% extends "base.html" %}

{% block contenido %}

<h2>Administración de Usuarios</h2>

<a
    href="{{ url_for('nuevo_usuario') }}"
    class="btn btn-primary mb-3"
>
    Nuevo Usuario
</a>

<table class="table table-striped">

    <thead>
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>

        {% for u in usuarios %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.usuario }}</td>
            <td>{{ u.rol }}</td>
            <td>

                {% if u.usuario != 'admin' %}
                <a
                    href="{{ url_for('eliminar_usuario', id=u.id) }}"
                    class="btn btn-danger btn-sm"
                    onclick="return confirm(
                        '¿Eliminar usuario?'
                    )"
                >
                    Eliminar
                </a>
                {% endif %}

            </td>
        </tr>
        {% endfor %}

    </tbody>

</table>

<a
    href="{{ url_for('dashboard') }}"
    class="btn btn-secondary"
>
    Regresar
</a>

{% endblock %}
